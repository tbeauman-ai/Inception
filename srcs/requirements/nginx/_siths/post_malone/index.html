<html>
    <head>
            <meta charset="utf-8">
    </head>
    <style>
        body {
            background-image: url("/images/post_malone.jpg");
            background-position: center;
            background-size: cover;
            background-repeat: no-repeat;
            background-attachment: fixed;
        }
        h1 {
            color: rgb(128, 0, 107);
            filter: drop-shadow(5px 5px red);
        }
    </style>
    <h1><img src="/images/title.gif" width="100%"></h1>
<form id="uploadForm">
    <input type="file" id="fileInput">
    <button type="button" onclick="uploadFile()">📤 Upload</button>
</form>
<div id="uploadStatus"></div>

<script>
async function uploadFile() {
    const file = document.getElementById("fileInput").files[0];
    if (!file) { alert("Choisis un fichier"); return; }
    
    const res = await fetch("/upload/" + file.name, {
        method: "POST",
        headers: { "Content-Type": file.type, "Content-Length": file.size },
        body: file
    });
    const status = document.getElementById("uploadStatus");
    if (res.ok) {
        status.textContent = "✅ Uploadé : " + file.name;
        loadFiles();
    } else {
        status.textContent = "❌ Erreur " + res.status;
    }
}
</script>

</html>
