services:
  wordpress:
    build: ./requirements/wordpress
    container_name: wordpress
    volumes:
      - wp_data:/var/www/wordpress
    env_file:
      - ./.env
    depends_on:
      - mariadb
    networks:
      - inception
    restart: unless-stopped

  nginx:
    build: ./requirements/nginx
    container_name: nginx
    ports:
      - "443:443"
    volumes:
      - wp_data:/var/www/wordpress
    depends_on:
      - wordpress
    networks:
      - inception
    restart: unless-stopped

  mariadb:
    build: ./requirements/mariadb
    container_name: mariadb
    volumes:
      - db_data:/var/lib/mysql
    env_file:
      - ./.env
    networks:
      - inception
    restart: unless-stopped

volumes:
  db_data:
    name: db_data
    driver: local
    driver_opts:
      type: none
      device: /home/tbeauman/data/db_data
      o: bind
  wp_data:
    name: wp_data
    driver: local
    driver_opts:
      type: none
      device: /home/tbeauman/data/wp_data
      o: bind

networks:
  inception:
    driver: bridge
